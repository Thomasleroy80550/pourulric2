name: Bump version

on:
  push:
    branches: [main]

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          fetch-tags: true

      - name: Bump version
        run: |
          # récupère la dernière version, ou vide s'il n'y a aucun tag
          OLD=$(git tag --sort=-version:refname | head -n1)
          # valeur de départ si aucun tag n'existe encore
          if [ -z "$OLD" ]; then
            OLD="v1.0.0.0"
          fi
          # incrémente le dernier segment (chaque segment par défaut à 0)
          IFS='.' read -r major minor patch build <<<"${OLD#v}"
          major=${major:-1}
          minor=${minor:-0}
          patch=${patch:-0}
          build=${build:-0}
          build=$((build + 1))
          NEW="v${major}.${minor}.${patch}.${build}"
          echo "NEW=$NEW" >> $GITHUB_ENV

      - name: Crée le fichier version.json
        run: echo "{\"version\":\"${NEW}\"}" > public/version.json

      - name: Commit & tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/version.json
          git commit -m "chore: bump version to ${NEW}" || exit 0
          git tag "${NEW}"
          git push origin main --tags